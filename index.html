<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏷️ Tag 指令生成器 · Allan</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   Glassmorphism · 毛玻璃質感
   背景 = 彩色漸層網格 + 浮動玻璃方塊；面板 = backdrop-filter
   四款漸層主題可即時切換（右上角色票）
   =========================================================== */
:root{
  --mono:'JetBrains Mono', ui-monospace, Consolas, monospace;
  --sans:'Noto Sans TC', -apple-system, 'Segoe UI', system-ui, sans-serif;

  /* 深色玻璃：保留毛玻璃質感，但讓文字永遠落在深底上（對比 ≥ 7:1） */
  --glass:rgba(22,17,44,.58);
  --glass-2:rgba(16,12,34,.46);
  --glass-3:rgba(38,30,68,.62);
  --edge:rgba(255,255,255,.30);
  --edge-soft:rgba(255,255,255,.16);
  --ink:#FFFFFF;
  --muted:rgba(255,255,255,.86);
  --faint:rgba(255,255,255,.66);
  --well:rgba(8,6,20,.58);             /* 指令框底 */
  --shadow:0 10px 36px rgba(10,6,30,.34);
  --radius:20px;

  --pos:#7CFFC0; --pos-bg:rgba(60,200,140,.20); --pos-edge:rgba(124,255,192,.58);
  --neg:#FFA898; --neg-bg:rgba(220,110,90,.22); --neg-edge:rgba(255,168,152,.58);
  --warn:#FFDD9B;
}
/* 漸層主題 */
body[data-g="candy"]  { --c1:#FF6EC7; --c2:#B36BFF; --c3:#5AC8FA; --c4:#FFC46B; }
body[data-g="ocean"]  { --c1:#3AC0FF; --c2:#5A6BFF; --c3:#38E8C8; --c4:#9B6BFF; }
body[data-g="sunset"] { --c1:#FF7A5A; --c2:#FF4E8B; --c3:#FFB25A; --c4:#8B5AFF; }
body[data-g="aurora"] { --c1:#5AFFC8; --c2:#4A6BFF; --c3:#B45AFF; --c4:#2FE0FF; }

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  min-height:100vh;color:var(--ink);font-family:var(--sans);line-height:1.6;
  -webkit-font-smoothing:antialiased;
  background:#141024;
  background-image:
    radial-gradient(circle at 12% 18%, var(--c1) 0%, transparent 42%),
    radial-gradient(circle at 88% 12%, var(--c2) 0%, transparent 44%),
    radial-gradient(circle at 78% 88%, var(--c3) 0%, transparent 46%),
    radial-gradient(circle at 10% 90%, var(--c4) 0%, transparent 40%),
    linear-gradient(135deg, var(--c2), var(--c3));
  background-attachment:fixed;
  transition:background-image .5s ease;
}
/* 暗色紗網：壓低背景明度，讓漸層的繽紛留在面板外緣 */
body::after{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(180deg, rgba(8,5,22,.42), rgba(8,5,22,.55));
}
/* 浮動玻璃方塊（裝飾） */
.deco{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.deco i{
  position:absolute;display:block;border-radius:22px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.3);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  animation:float 16s ease-in-out infinite;
}
.deco i:nth-child(1){width:120px;height:120px;top:8%;left:6%;animation-delay:0s}
.deco i:nth-child(2){width:80px;height:80px;top:22%;right:9%;animation-delay:-3s;border-radius:50%}
.deco i:nth-child(3){width:160px;height:160px;bottom:10%;left:12%;animation-delay:-6s}
.deco i:nth-child(4){width:100px;height:100px;bottom:18%;right:7%;animation-delay:-9s;border-radius:50%}
.deco i:nth-child(5){width:60px;height:60px;top:52%;left:48%;animation-delay:-12s}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-26px) rotate(7deg)}}

/* 高對比模式：加深紗網與玻璃底，字更實 */
body.hc::after{background:linear-gradient(180deg, rgba(6,4,18,.66), rgba(6,4,18,.76))}
body.hc{--glass:rgba(16,12,34,.80);--glass-2:rgba(12,9,28,.72);--glass-3:rgba(40,32,72,.82);
        --well:rgba(4,3,12,.80);--edge:rgba(255,255,255,.38);--edge-soft:rgba(255,255,255,.22);
        --muted:rgba(255,255,255,.94);--faint:rgba(255,255,255,.78)}
body.hc .deco{opacity:.45}
body.hc .cmd{font-weight:600}

.wrap{max-width:1120px;margin:0 auto;padding:26px 22px 70px;position:relative;z-index:1}

/* 共用玻璃面板 */
.panel{
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.4);
  -webkit-backdrop-filter:blur(18px) saturate(1.4);
  border:1px solid var(--edge);
  border-radius:var(--radius);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.28);
  overflow:hidden;
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 18px;border-bottom:1px solid var(--edge-soft);
  background:linear-gradient(180deg, rgba(255,255,255,.07), transparent);
}
.panel-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:.3px;
  text-shadow:0 1px 2px rgba(0,0,0,.18)}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:13px}
.logo{
  width:52px;height:52px;border-radius:16px;flex:0 0 auto;font-size:26px;display:grid;place-items:center;
  background:var(--glass-3);border:1px solid var(--edge);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.4);
}
h1{font-size:23px;font-weight:900;margin:0;letter-spacing:.4px;text-shadow:0 2px 8px rgba(0,0,0,.22)}
.sub{color:var(--muted);font-size:13px;margin-top:1px;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.head-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* 漸層色票 */
.gs{display:flex;gap:6px;padding:6px;border-radius:14px;background:var(--glass-2);border:1px solid var(--edge-soft);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.sw{width:26px;height:26px;border-radius:9px;border:2px solid transparent;cursor:pointer;padding:0;transition:.16s}
.sw:hover{transform:translateY(-2px)}
.sw[aria-pressed="true"]{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.28)}
.sw.candy {background:linear-gradient(135deg,#FF6EC7,#5AC8FA)}
.sw.ocean {background:linear-gradient(135deg,#3AC0FF,#38E8C8)}
.sw.sunset{background:linear-gradient(135deg,#FF7A5A,#FF4E8B)}
.sw.aurora{background:linear-gradient(135deg,#5AFFC8,#B45AFF)}

/* Tabs */
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{
  font-family:var(--sans);font-size:13.5px;font-weight:700;cursor:pointer;color:var(--muted);
  background:var(--glass-2);border:1px solid var(--edge-soft);border-radius:14px;padding:10px 16px;
  display:flex;align-items:center;gap:7px;transition:.18s;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.tab:hover{color:#fff;transform:translateY(-1px);border-color:var(--edge)}
.tab .no{font-family:var(--mono);font-size:10px;opacity:.75}
.tab[aria-selected="true"]{
  color:#fff;background:rgba(255,255,255,.30);border-color:#fff;
  box-shadow:0 4px 18px rgba(255,255,255,.22), inset 0 1px 0 rgba(255,255,255,.5);
}

.btn{
  font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink);
  background:var(--glass-2);border:1px solid var(--edge-soft);border-radius:11px;padding:7px 13px;transition:.15s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.btn:hover{background:var(--glass-3);border-color:var(--edge)}

.view{display:none}
.view.on{display:flex;flex-direction:column;gap:18px;animation:fade .3s ease both}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------- Mode 1 ---------- */
textarea{
  width:100%;min-height:250px;resize:vertical;display:block;background:transparent;border:0;color:#fff;
  font-family:var(--mono);font-size:13.5px;line-height:1.8;padding:16px 18px;outline:none;letter-spacing:.2px;
}
textarea::placeholder{color:var(--faint)}
textarea{text-shadow:0 1px 2px rgba(0,0,0,.35)}
.foot{
  display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 16px;
  border-top:1px solid var(--edge-soft);font-size:12px;color:var(--muted);background:rgba(255,255,255,.06);
}
.foot b{color:#fff;font-family:var(--mono)}

.results{padding:16px;display:flex;flex-direction:column;gap:14px}
.empty{text-align:center;color:var(--muted);padding:34px 18px;margin:auto;max-width:340px}
.empty .em{font-size:36px;display:block;margin-bottom:10px;opacity:.85}
.empty p{margin:0;font-size:13.5px;line-height:1.7}

.card{
  background:var(--glass-2);border:1px solid var(--edge-soft);border-radius:16px;padding:15px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
  animation:pop .28s ease both;
}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.who{display:flex;align-items:center;gap:9px;min-width:0}
.idx{font-family:var(--mono);font-size:11px;font-weight:700;color:#2A1D4A;background:rgba(255,255,255,.85);border-radius:8px;padding:3px 8px;flex:0 0 auto}
.who .nm{font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.who .nm b{color:#fff}
.pill-ok{font-size:11px;font-weight:700;color:var(--pos);background:var(--pos-bg);border:1px solid var(--pos-edge);border-radius:8px;padding:2px 8px;flex:0 0 auto}

.kv{display:flex;align-items:center;gap:8px;margin-bottom:11px;font-size:12.5px}
.kv .k{color:var(--faint)}
.idpill{font-family:var(--mono);font-size:13.5px;letter-spacing:.4px;color:#fff;background:var(--well);border:1px solid var(--edge-soft);border-radius:9px;padding:5px 10px}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{font-family:var(--mono);font-size:12.5px;font-weight:700;border-radius:9px;padding:4px 9px;display:inline-flex;align-items:center;gap:5px}
.chip.neg{color:var(--neg);background:var(--neg-bg);border:1px solid var(--neg-edge)}
.chip.pos{color:var(--pos);background:var(--pos-bg);border:1px solid var(--pos-edge)}
.chip.fail{color:var(--faint);background:transparent;border:1px dashed var(--faint);text-decoration:line-through}

/* 指令框 */
.cmd-row{display:flex;align-items:stretch;gap:10px}
.cmd{
  flex:1;min-width:0;font-family:var(--mono);font-size:15.5px;line-height:1.9;color:#fff;letter-spacing:.3px;font-weight:500;
  background:var(--well);border:1px solid var(--edge-soft);border-radius:13px;padding:14px 16px;
  white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;
  -webkit-user-select:all;user-select:all;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.cmd .at{color:var(--warn);font-weight:700}
.cmd .id{color:#9FE9FF;font-weight:700}
.cmd .slash{color:var(--faint)}
.cmd .minus{color:var(--neg);font-weight:700}
.cmd .plus{color:var(--pos);font-weight:700}
.copy{
  flex:0 0 auto;width:52px;cursor:pointer;color:#2A1D4A;
  background:rgba(255,255,255,.88);border:1px solid #fff;border-radius:13px;padding:0;
  display:flex;align-items:center;justify-content:center;transition:.16s;
  box-shadow:0 4px 16px rgba(0,0,0,.12);
}
.copy:hover{background:#fff;transform:translateY(-1px)}
.copy:active{transform:translateY(1px)}
.copy.done{background:var(--pos);border-color:var(--pos);color:#0C3B26}
.copy svg{width:19px;height:19px}

.warn{
  margin-top:10px;font-size:12.5px;color:var(--warn);display:flex;align-items:flex-start;gap:8px;
  background:rgba(255,217,138,.12);border:1px solid rgba(255,217,138,.4);border-radius:11px;padding:9px 12px;
}
.bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 2px 2px}
.bar .n{font-size:13px;color:var(--muted)}
.bar .n b{color:#fff;font-family:var(--mono)}
.copyall{
  font-size:12.5px;font-weight:700;cursor:pointer;color:#fff;background:var(--glass-2);
  border:1px solid var(--edge);border-radius:11px;padding:8px 14px;display:flex;align-items:center;gap:7px;transition:.15s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.copyall:hover{background:var(--glass-3)}
.copyall.done{border-color:var(--pos);color:var(--pos)}
.copyall svg{width:14px;height:14px}

/* ---------- Mode 2 ---------- */
/* 凸顯的 target 欄位 */
.target-hero{
  padding:20px;
  background:linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
  border-bottom:1px solid var(--edge-soft);
}
.target-hero .lbl{
  font-size:14px;font-weight:900;letter-spacing:.5px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;text-shadow:0 1px 3px rgba(0,0,0,.2);
}
.target-hero .lbl .hint{font-size:11.5px;font-weight:400;color:var(--faint);letter-spacing:0}
.target-wrap{position:relative;display:flex;align-items:center}
#target{
  width:100%;font-family:var(--mono);font-size:17px;font-weight:700;color:#fff;letter-spacing:.4px;
  background:var(--well);border:2px solid var(--edge);border-radius:15px;
  padding:16px;outline:none;transition:.18s;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:inset 0 2px 8px rgba(0,0,0,.14);
}
#target:focus{border-color:#fff;box-shadow:0 0 0 5px rgba(255,255,255,.22), inset 0 2px 8px rgba(0,0,0,.14)}
#target::placeholder{color:rgba(255,255,255,.55);font-weight:500;letter-spacing:.3px}

.zones{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px}
@media(max-width:640px){.zones{grid-template-columns:1fr}}
.zone{
  border-radius:16px;padding:13px;min-height:150px;transition:.18s;display:flex;flex-direction:column;
  border:2px dashed var(--edge-soft);background:var(--glass-2);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.zone.add{border-color:var(--pos-edge);background:var(--pos-bg)}
.zone.rm{border-color:var(--neg-edge);background:var(--neg-bg)}
.zone.over{transform:scale(1.02);border-style:solid}
.zone.add.over{border-color:var(--pos);box-shadow:0 0 0 5px rgba(110,243,176,.20)}
.zone.rm.over{border-color:var(--neg);box-shadow:0 0 0 5px rgba(255,154,139,.20)}
.zone-head{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:11px}
.zone.add .zone-head{color:var(--pos)}
.zone.rm .zone-head{color:var(--neg)}
.zone-head .cnt{margin-left:auto;font-family:var(--mono);font-size:11px;background:var(--well);border:1px solid var(--edge-soft);border-radius:7px;padding:1px 8px;color:#fff}
.zone-body{display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;flex:1}
.zone-empty{margin:auto;font-size:12px;color:var(--faint);text-align:center;line-height:1.75}

/* 區內標籤：點一下即移除、可拖曳互換 */
.dtag{
  font-family:var(--mono);font-size:12.5px;font-weight:700;border-radius:11px;padding:7px 11px;
  cursor:grab;user-select:none;display:inline-flex;align-items:center;gap:7px;transition:.15s;
  background:rgba(255,255,255,.85);border:1px solid #fff;
}
.dtag:active{cursor:grabbing}
.dtag:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.18)}
.dtag.dragging{opacity:.35;transform:rotate(-2deg)}
.dtag .x{font-family:var(--sans);font-weight:900;opacity:.4;line-height:1;font-size:13px}
.dtag:hover .x{opacity:.9}
.zone.add .dtag{color:#0C3B26}
.zone.rm .dtag{color:#6E2418}

/* 標籤庫 */
.palette{padding:18px;border-top:1px solid var(--edge-soft)}
.lbl{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.lbl .hint{font-size:11.5px;font-weight:400;color:var(--faint)}
.pal-grid{display:flex;flex-wrap:wrap;gap:8px}
.pal-grid.over{outline:2px dashed var(--edge);outline-offset:8px;border-radius:12px}
.ptag{
  position:relative;font-family:var(--mono);font-size:12.5px;font-weight:700;color:#fff;
  background:var(--glass-2);border:1px solid var(--edge-soft);border-radius:12px;padding:8px 11px;
  cursor:grab;user-select:none;transition:.16s;display:inline-flex;align-items:center;gap:9px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.ptag:hover{background:var(--glass-3);border-color:var(--edge);transform:translateY(-2px)}
.ptag:active{cursor:grabbing}
.ptag.dragging{opacity:.35}
.ptag.used{opacity:.38}
.ptag .use{font-size:10.5px;font-weight:700;color:#fff;background:rgba(255,255,255,.16);border-radius:6px;padding:1px 5px;min-width:20px;text-align:center}
.ptag .qa{display:flex;gap:4px}
.ptag .q{
  width:21px;height:21px;border-radius:7px;border:0;cursor:pointer;font-size:13px;font-weight:900;line-height:1;
  display:grid;place-items:center;transition:.13s;font-family:var(--sans);
}
.ptag .q.p{background:var(--pos-bg);color:var(--pos);border:1px solid var(--pos-edge)}
.ptag .q.p:hover{background:var(--pos);color:#0C3B26}
.ptag .q.m{background:var(--neg-bg);color:var(--neg);border:1px solid var(--neg-edge)}
.ptag .q.m:hover{background:var(--neg);color:#6E2418}
.ptag .del{
  position:absolute;top:-8px;right:-8px;width:19px;height:19px;border-radius:50%;
  background:rgba(30,20,50,.8);color:#fff;border:1px solid var(--edge);
  font-size:11px;line-height:1;display:none;place-items:center;cursor:pointer;font-family:var(--sans);
}
.ptag:hover .del{display:grid}
.ptag .del:hover{background:var(--neg);color:#6E2418}

.addtag{display:flex;gap:9px;margin-top:14px}
#newTag{
  flex:1;font-family:var(--mono);font-size:14px;color:#fff;background:var(--well);
  border:1px solid var(--edge-soft);border-radius:12px;padding:11px 14px;outline:none;transition:.15s;
}
#newTag:focus{border-color:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.18)}
#newTag::placeholder{color:var(--faint)}
.addtag button{
  flex:0 0 auto;width:52px;cursor:pointer;color:#2A1D4A;background:rgba(255,255,255,.88);
  border:1px solid #fff;border-radius:12px;padding:0;transition:.15s;
  display:flex;align-items:center;justify-content:center;
}
.addtag button svg{width:19px;height:19px}
.addtag button:hover{background:#fff;transform:translateY(-1px)}

.out2{padding:18px}
.out2 .cmd{font-size:16px}

/* 三寶連結 */
.refgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;padding:18px}
@media(max-width:860px){.refgrid{grid-template-columns:1fr}}
.ref{
  text-decoration:none;color:inherit;background:var(--glass-2);border:1px solid var(--edge-soft);
  border-radius:15px;padding:15px;display:flex;flex-direction:column;gap:7px;transition:.18s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.ref:hover{background:var(--glass-3);border-color:#fff;transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.16)}
.ref .rt{font-size:13.5px;font-weight:700;line-height:1.55}
.ref .rt .no{font-family:var(--mono);font-size:11px;color:var(--faint);margin-right:7px}
.ref .ru{font-family:var(--mono);font-size:11.5px;color:var(--faint);word-break:break-all}

footer{margin-top:34px;text-align:center;color:var(--muted);font-size:12.5px;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.toast{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
  background:rgba(255,255,255,.9);color:#2A1D4A;font-weight:700;font-size:13.5px;
  padding:12px 22px;border-radius:14px;opacity:0;pointer-events:none;transition:.26s;
  box-shadow:0 10px 34px rgba(0,0,0,.22);z-index:80;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid #fff;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

</head>
<body data-g="candy">
<div class="deco"><i></i><i></i><i></i><i></i><i></i></div>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">🏷️</div>
      <div>
        <h1>Tag 指令生成器</h1>
        <div class="sub">給 Allan 的封鎖標籤小幫手 · 內部工具</div>
      </div>
    </div>
    <div class="head-right">
      <button class="btn" id="hcBtn" title="切換高對比（提升文字可讀性）">🔆 高對比</button>
      <div class="gs" role="group" aria-label="配色">
        <button class="sw candy"  data-g="candy"  title="糖果" aria-pressed="true"></button>
        <button class="sw ocean"  data-g="ocean"  title="海洋" aria-pressed="false"></button>
        <button class="sw sunset" data-g="sunset" title="夕陽" aria-pressed="false"></button>
        <button class="sw aurora" data-g="aurora" title="極光" aria-pressed="false"></button>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true" data-view="v1"><span>🚨</span><span>n8n alert 自動封鎖通知</span><span class="no">M1</span></button>
        <button class="tab" role="tab" aria-selected="false" data-view="v2"><span>🤖</span><span>Tag新增 / 移除</span><span class="no">M2</span></button>
      </div>
    </div>
  </header>

  <!-- ========== 模式一（上下堆疊） ========== -->
  <section class="view on" id="v1">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">貼上通知文字</div>
        <button class="btn" id="loadExample">載入範例</button>
      </div>
      <textarea id="input" spellcheck="false" placeholder="貼上 n8n 的「Banned Tag 更新通知」全文…&#10;&#10;支援一次多筆、Slack emoji 短碼、反引號、中文 Tag。"></textarea>
      <div class="foot"><div><b id="charCount">0</b> 字元</div><button class="btn" id="clearBtn">清空</button></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">產生的指令</div>
        <button class="copyall" id="copyAll" style="display:none"></button>
      </div>
      <div class="results" id="results"></div>
    </div>

    <div class="panel">
      <div class="panel-head"><div class="panel-title">聊天查詢三寶 · Mixpanel</div></div>
      <div class="refgrid" id="refGrid"></div>
    </div>
  </section>

  <!-- ========== 模式二 ========== -->
  <section class="view" id="v2">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">目標與標籤</div>
        <button class="btn" id="resetM2">全部清空</button>
      </div>

      <div class="target-hero">
        <div class="lbl">👤 Username 或 UID <span class="hint">指令要作用的對象</span></div>
        <div class="target-wrap">
          <input type="text" id="target" placeholder="Username / UID" spellcheck="false" autocomplete="off">
        </div>
      </div>

      <div class="zones">
        <div class="zone add" id="zoneAdd" data-zone="add">
          <div class="zone-head"><span>新增</span><span class="cnt" id="cntAdd">0</span></div>
          <div class="zone-body" id="bodyAdd"></div>
        </div>
        <div class="zone rm" id="zoneRm" data-zone="rm">
          <div class="zone-head"><span>移除</span><span class="cnt" id="cntRm">0</span></div>
          <div class="zone-body" id="bodyRm"></div>
        </div>
      </div>

      <div class="palette">
        <div class="lbl">標籤庫 <span class="hint">依使用次數由多到少排序 · 拖曳標籤到上方框內</span></div>
        <div class="pal-grid" id="palette"></div>
        <div class="addtag">
          <input type="text" id="newTag" placeholder="自訂新標籤…可用空格分隔一次新增多個" spellcheck="false" autocomplete="off">
          <button id="addTagBtn" title="新增標籤（可用空格分隔一次多筆）"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><div class="panel-title">產生的指令</div></div>
      <div class="out2" id="out2"></div>
    </div>
  </section>

  <footer>🏷️ 送出前請再看一眼 ID 與 Tag · 內部效率工具</footer>
</div>
<div class="toast" id="toast">已複製</div>

<script>
(function(){
  'use strict';
  const $=s=>document.querySelector(s);
  const AT='＠', BOT='Allan';
  const TAGCHARS='[A-Za-z0-9_\\-\\u4e00-\\u9fff]+';
  const LS={tags:'tagtool.palette.v2', counts:'tagtool.counts.v1', target:'tagtool.target.v1', g:'tagtool.grad.v1'};

  const DEFAULT_TAGS=['banned','hidden','adult_spam','livestream_chat_spam','talents-headhunted','menu_drain','Diamond_Laundering_Risk','疑似盜刷'];
  const REFS=[
    {t:'查用戶站內發話紀錄', u:'https://mixpanel.com/s/4z77wA'},
    {t:'查私訊（主播＆用戶對話交錯時間序）', u:'https://mixpanel.com/s/4Cg4wo'},
    {t:'用戶直播間聊天紀錄（username 用戶 / user.id 主播）', u:'https://mixpanel.com/s/UptPV'},
  ];
  const EXAMPLE=
`Banned Tag 更新通知
用戶 ID: 5f81d698c0e594e8b619c445
用戶 name: ruru8314cl4
禁用原因: 偵測到色情引流廣告
執行結果匯報:
━━━━━━━━━━━━━━
1. Tag banned: 成功
2. Tag adult_spam: 成功

Banned Tag 更新通知 (聊天室線路)
SWAG ID: 6a49f3f3a5877e339d2b320c
禁用原因: 偵測到聊天室發送引流惡意廣告
執行結果匯報:
━━━━━━━━━━━━━━
1. Banned Tag:  成功
2. livestream_chat_spam Tag:  成功

Banned Tag 更新通知
用戶 ID: 6a207290d0d43c0db93b5fc8
用戶 name: kitty.meo
禁用原因: 觸發二級敏感詞
執行結果匯報:
━━━━━━━━━━━━━━
1. Tag banned:  :白色勾勾: 成功
2. Tag Diamond_Laundering_Risk: :白色勾勾: 成功

風險帳號自動封鎖通知
用戶 id: \`645e0e257a223d98501bb785\`
觸發情境: 單日內不重複卡片支付 >5 張者付款成功
執行結果匯報 (Tag 修正):
━━━━━━━━━━━━━━
1. Tag \`banned\`: 成功
2. Tag \`hidden\`: 成功
3. Tag \`疑似盜刷\`: 成功`;

  const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const COPY_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  const OK_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  let tt;
  const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1600);};
  function copy(s,m){const d=()=>toast(m||'已複製');
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(s).then(d).catch(()=>fb(s,d));else fb(s,d);}
  function fb(s,cb){const a=document.createElement('textarea');a.value=s;a.style.position='fixed';a.style.opacity='0';
    document.body.appendChild(a);a.select();try{document.execCommand('copy');cb&&cb();}catch(e){}document.body.removeChild(a);}
  const store=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
  const load=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}};

  const buildCmd=(t,add,rm)=>AT+BOT+' utag '+t+'/'+add.concat(rm.map(x=>'-'+x)).join(' ');
  const hlCmd=(t,add,rm)=>'<span class="at">'+AT+'</span>'+BOT+' utag <span class="id">'+esc(t)+'</span><span class="slash">/</span>'+
    add.map(x=>'<span class="plus">'+esc(x)+'</span>').concat(rm.map(x=>'<span class="minus">-'+esc(x)+'</span>')).join(' ');
  function bindCopy(btn,text,msg){
    btn.onclick=()=>{copy(text,msg);const o=btn.innerHTML;btn.classList.add('done');btn.innerHTML=OK_SVG;
      setTimeout(()=>{btn.classList.remove('done');btn.innerHTML=o;},1400);};
  }

  /* ================= 模式一 ================= */
  const cleanStatus=s=>String(s).replace(/:[^:\s]+:/g,' ').replace(/[\u2700-\u27BF\uFE0F\u2B00-\u2BFF\u{1F300}-\u{1FAFF}]/gu,' ').trim();
  function extractTags(sec){
    const seen=new Set(),ok=[],failed=[];
    const pats=[new RegExp('^\\s*\\d+[.、)]?\\s*Tag\\s*[:：]?\\s*('+TAGCHARS+')\\s*[:：]\\s*(.+)$','i'),
                new RegExp('^\\s*\\d+[.、)]?\\s*('+TAGCHARS+')\\s+Tag\\s*[:：]\\s*(.+)$','i')];
    sec.split(/\r?\n/).forEach(raw=>{
      const line=raw.replace(/[`*"']/g,'');
      for(const re of pats){const mm=line.match(re);
        if(mm){let t=mm[1];if(t.toLowerCase()==='banned')t='banned';
          const st=cleanStatus(mm[2]);
          const bad=/失敗|失败|fail|error|錯誤|false|跳過|skip/i.test(st);
          const good=/成功|success|完成|true|done|ok\b/i.test(st);
          if(!seen.has(t)){seen.add(t);(good&&!bad?ok:failed).push(t);}break;}}
    });
    return{ok:ok.filter(t=>t==='banned').concat(ok.filter(t=>t!=='banned')),failed};
  }
  function parse(text){
    if(!text.trim())return[];
    const re=/\bID\s*[:：]\s*[`'"\u3000]*\s*([a-fA-F0-9]{24})/gi;
    const A=[];let m;while((m=re.exec(text))!==null)A.push({id:m[1],start:m.index});
    return A.map((a,i)=>{
      const sec=text.slice(a.start,i+1<A.length?A[i+1].start:text.length);
      const{ok,failed}=extractTags(sec);
      const name=(sec.match(/name\s*[:：]\s*[`'"]?([^\s`'"]+)/i)||[])[1]||'';
      const reason=(sec.match(/(?:禁用原因|判定邏輯|觸發情境)\s*[:：]\s*(.+)/)||[])[1]||'';
      return{id:a.id,tags:ok,failed,name,reason:reason.trim()};
    });
  }
  function renderM1(){
    const text=$('#input').value;$('#charCount').textContent=text.length;
    const box=$('#results'),ca=$('#copyAll');
    const items=parse(text);
    if(!text.trim()){box.innerHTML='<div class="empty"><span class="em">📥</span><p>把 n8n 的封鎖通知整段貼到上方<br>指令會即時產生在這裡</p></div>';ca.style.display='none';return;}
    if(!items.length){box.innerHTML='<div class="empty"><span class="em">🔎</span><p>找不到符合格式的 ID 或 Tag。<br>請確認包含 <b>ID:</b> 與「執行結果匯報」的 Tag 清單。</p></div>';ca.style.display='none';return;}
    box.innerHTML='';
    const bar=document.createElement('div');bar.className='bar';
    bar.innerHTML='<div class="n">共 <b>'+items.length+'</b> 筆</div>';box.appendChild(bar);
    const all=[];
    items.forEach((it,i)=>{
      const card=document.createElement('div');card.className='card';
      const has=it.tags.length>0,cmd=has?buildCmd(it.id,[],it.tags):'';
      if(has)all.push(cmd);
      const chips=it.tags.map(t=>'<span class="chip '+(t==='banned'?'neg':'pos')+'">'+esc(t)+'</span>').join('')
                 +it.failed.map(t=>'<span class="chip fail">'+esc(t)+'</span>').join('');
      const label=it.name?'name <b>'+esc(it.name)+'</b>':(it.reason?esc(it.reason.slice(0,26)):'');
      card.innerHTML='<div class="card-top"><div class="who"><span class="idx">#'+(i+1)+'</span>'+(label?'<span class="nm">'+label+'</span>':'')+'</div>'+
        (has?'<span class="pill-ok">'+it.tags.length+' Tag</span>':'')+'</div>'+
        '<div class="kv"><span class="k">ID</span><span class="idpill">'+it.id+'</span></div>'+
        '<div class="chips">'+chips+'</div>'+
        (has?'<div class="cmd-row"><div class="cmd">'+hlCmd(it.id,[],it.tags)+'</div><button class="copy" title="複製指令">'+COPY_SVG+'</button></div>'
            :'<div class="warn"><span>⚠️</span><span>此筆未偵測到成功的 Tag，未產生指令。</span></div>')+
        (it.failed.length?'<div class="warn"><span>⚠️</span><span>已排除未成功的 Tag：'+it.failed.map(esc).join('、')+'</span></div>':'');
      box.appendChild(card);
      if(has)bindCopy(card.querySelector('.copy'),cmd,'指令已複製');
    });
    if(all.length>1){ca.style.display='flex';ca.innerHTML=COPY_SVG+'複製全部';
      ca.onclick=()=>{copy(all.join('\n'),all.length+' 筆指令已複製');ca.classList.add('done');setTimeout(()=>ca.classList.remove('done'),1400);};
    }else ca.style.display='none';
  }

  /* ================= 模式二 ================= */
  let palette=load(LS.tags,DEFAULT_TAGS.slice());
  let counts =load(LS.counts,{});
  const zones={add:[],rm:[]};

  // 依使用次數排序（多→少），同次數維持原順序
  function sortedPalette(){
    return palette.map((t,i)=>({t,i,c:counts[t]||0}))
                  .sort((a,b)=> b.c-a.c || a.i-b.i)
                  .map(o=>o.t);
  }
  function bump(tag){ counts[tag]=(counts[tag]||0)+1; store(LS.counts,counts); }

  function renderPalette(){
    const g=$('#palette');
    g.innerHTML=sortedPalette().map(t=>{
      const used=zones.add.includes(t)||zones.rm.includes(t);
      return '<div class="ptag'+(used?' used':'')+'" draggable="true" data-tag="'+esc(t)+'" title="拖曳到「新增」或「移除」">'+
        esc(t)+'<span class="del" title="從標籤庫刪除">×</span></div>';
    }).join('');
    g.querySelectorAll('.ptag').forEach(el=>{
      const tag=el.dataset.tag;
      el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',tag);e.dataTransfer.effectAllowed='copyMove';el.classList.add('dragging');});
      el.addEventListener('dragend',()=>el.classList.remove('dragging'));
      el.querySelector('.del').onclick=e=>{
        e.stopPropagation();
        palette=palette.filter(x=>x!==tag);store(LS.tags,palette);
        zones.add=zones.add.filter(x=>x!==tag);zones.rm=zones.rm.filter(x=>x!==tag);
        renderM2();toast('已從標籤庫刪除');
      };
    });
  }

  function putTag(tag,to){
    const other=to==='add'?'rm':'add';
    const moved=zones[other].includes(tag);
    zones[other]=zones[other].filter(t=>t!==tag);          // 互斥：拖到另一邊就停在那邊
    if(!zones[to].includes(tag)){ zones[to].push(tag); if(!moved) bump(tag); }
    renderM2();
  }
  function pullTag(tag){                                    // 從區塊移回標籤庫
    zones.add=zones.add.filter(t=>t!==tag);
    zones.rm =zones.rm.filter(t=>t!==tag);
    renderM2();
  }

  function renderZone(k){
    const body=k==='add'?$('#bodyAdd'):$('#bodyRm');
    (k==='add'?$('#cntAdd'):$('#cntRm')).textContent=zones[k].length;
    if(!zones[k].length){
      body.innerHTML='<div class="zone-empty">把標籤拖到這裡<br>'+(k==='add'?'（指令不加前綴）':'（指令加上 − 前綴）')+'</div>';
      return;
    }
    body.innerHTML=zones[k].map(t=>'<span class="dtag" draggable="true" data-tag="'+esc(t)+'" title="點一下移回標籤庫">'+esc(t)+'<span class="x">×</span></span>').join('');
    body.querySelectorAll('.dtag').forEach(el=>{
      const tag=el.dataset.tag;
      el.onclick=()=>pullTag(tag);                          // ① 點擊一次即移除
      el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',tag);e.dataTransfer.effectAllowed='move';el.classList.add('dragging');});
      el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    });
  }

  function renderM2(){
    renderZone('add');renderZone('rm');renderPalette();
    const target=$('#target').value.trim();store(LS.target,target);
    const out=$('#out2'),has=zones.add.length||zones.rm.length;
    if(!target&&!has){out.innerHTML='<div class="empty"><span class="em">🎯</span><p>填入 Username / UID，<br>再把標籤拖進「新增」或「移除」</p></div>';return;}
    if(!target){out.innerHTML='<div class="warn"><span>⚠️</span><span>還差 <b>Username 或 UID</b>，填上就會產生指令。</span></div>';return;}
    if(!has){out.innerHTML='<div class="warn"><span>⚠️</span><span>還沒有任何 Tag，請從下方標籤庫拖曳加入。</span></div>';return;}
    const cmd=buildCmd(target,zones.add,zones.rm);
    out.innerHTML='<div class="chips">'+
      zones.add.map(t=>'<span class="chip pos">＋ '+esc(t)+'</span>').join('')+
      zones.rm.map(t=>'<span class="chip neg">− '+esc(t)+'</span>').join('')+'</div>'+
      '<div class="cmd-row"><div class="cmd">'+hlCmd(target,zones.add,zones.rm)+'</div><button class="copy" title="複製指令">'+COPY_SVG+'</button></div>';
    bindCopy(out.querySelector('.copy'),cmd,'指令已複製');
  }

  /* 拖放：兩個區塊互拖 + 拖回標籤庫 */
  ['zoneAdd','zoneRm'].forEach(id=>{
    const z=document.getElementById(id),k=z.dataset.zone;
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('over');});
    z.addEventListener('dragleave',e=>{if(!z.contains(e.relatedTarget))z.classList.remove('over');});
    z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('over');
      const t=e.dataTransfer.getData('text/plain');if(t)putTag(t,k);});
  });
  const pal=$('#palette');
  pal.addEventListener('dragover',e=>{e.preventDefault();pal.classList.add('over');});
  pal.addEventListener('dragleave',e=>{if(!pal.contains(e.relatedTarget))pal.classList.remove('over');});
  pal.addEventListener('drop',e=>{e.preventDefault();pal.classList.remove('over');
    const t=e.dataTransfer.getData('text/plain');if(t)pullTag(t);});

  /* ================= 三寶連結 ================= */
  $('#refGrid').innerHTML=REFS.map((r,i)=>
    '<a class="ref" href="'+r.u+'" target="_blank" rel="noopener">'+
    '<div class="rt"><span class="no">0'+(i+1)+'</span>'+esc(r.t)+' ↗</div>'+
    '<div class="ru">'+esc(r.u)+'</div></a>').join('');

  /* ================= 事件 ================= */
  function setG(n){document.body.dataset.g=n;store(LS.g,n);
    document.querySelectorAll('.sw').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.g===n)));}
  document.querySelectorAll('.sw').forEach(b=>b.onclick=()=>setG(b.dataset.g));

  const hcBtn=$('#hcBtn');
  function setHC(on){
    document.body.classList.toggle('hc',on);
    store('tagtool.hc.v1',on);
    hcBtn.textContent = on ? '🔅 標準' : '🔆 高對比';
    hcBtn.style.background = on ? 'rgba(255,255,255,.88)' : '';
    hcBtn.style.color = on ? '#2A1D4A' : '';
  }
  hcBtn.onclick=()=>setHC(!document.body.classList.contains('hc'));

  $('#input').addEventListener('input',renderM1);
  $('#clearBtn').onclick=()=>{$('#input').value='';renderM1();$('#input').focus();};
  $('#loadExample').onclick=()=>{$('#input').value=EXAMPLE;renderM1();};
  $('#target').addEventListener('input',renderM2);

  function addNewTag(){
    const i=$('#newTag');
    // 以空白分隔，可一次新增多個標籤
    const list=i.value.split(/[\s,，、]+/)
                      .map(x=>x.trim().replace(/[`*"']/g,''))
                      .filter(Boolean);
    if(!list.length)return;
    const added=[],dup=[];
    list.forEach(v=>{
      if(palette.includes(v)) dup.push(v);
      else { palette.push(v); added.push(v); }
    });
    store(LS.tags,palette);
    i.value='';
    renderM2();
    if(added.length) toast('已加入 '+added.length+' 個標籤');
    else if(dup.length) toast('標籤已存在');
  }
  $('#addTagBtn').onclick=addNewTag;
  $('#newTag').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addNewTag();}});
  $('#resetM2').onclick=()=>{zones.add=[];zones.rm=[];$('#target').value='';store(LS.target,'');renderM2();toast('已清空');};

  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected',String(x===t)));
      document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.id===t.dataset.view));
    };
  });

  /* init */
  setG(load(LS.g,'candy'));
  setHC(load('tagtool.hc.v1',false));
  $('#target').value=load(LS.target,'')||'';
  renderM1();renderM2();
})();
</script>
</body>
</html>
